{{ define "main" }}
<section class="container bg:sky-88 p:80|0" data-editable="layouts/actualidade/list.html:header">
    <h1 class="text:center mb:60 f:30">{{ .Title }}</h1>
    
    <div class="max-w:1200px mx:auto d:flex ai:center jc:center gap:60 flex:wrap">
        <div class="flex:1|1|400px">
            <img src="{{ relURL "img/actualidade/Xornada_cipriano.webp" }}" alt="{{ .Params.cipriano.title }}" class="w:100% h:auto r:8px">
        </div>
        <div class="flex:1|1|400px d:flex flex:col jc:center">
            <h2>{{ .Params.cipriano.title }}</h2>
            <h3>{{ .Params.cipriano.subtitle }}</h3>
            <div class="white:normal">{{ .Params.cipriano.texto | markdownify }}</div>
        </div>
    </div>
</section>
{{ end }}
