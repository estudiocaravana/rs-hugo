<!-- layouts/partials/editor.html -->
{{ if hugo.IsServer }}
  <style>
    /* Tu barra lateral blanca minimalista de 460px */
    #visual-editor-sidebar {
        position: fixed; right: -480px; top: 50%; transform: translateY(-50%);
        width: 460px; height: auto; max-height: 90vh; 
        background-color: #ffffff !important; color: #0f172a !important; opacity: 0.98; 
        box-shadow: -4px 0 35px rgba(0,0,0,0.15) !important;
        z-index: 999999 !important; border-radius: 12px !important; padding: 24px 24px 0px 36px !important;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif !important;
        display: flex !important; flex-direction: column !important; box-sizing: border-box !important; transition: right 0.2s ease-in-out !important;
    }
    #visual-editor-sidebar p { font-size: 13px !important; color: #64748b !important; margin: 0 0 12px 0 !important; line-height: 1.4 !important; }
    #visual-editor-sidebar span { word-break: break-all !important; font-weight: 600 !important; color: #0f172a !important; }

    /* EL EDITOR ÚNICO DE UNA SOLA CAPA */
    #ed-class-input {
        width: 100% !important;
        height: 180px !important;
        padding: 16px 0px !important;
        background-color: transparent !important; /* Fondo transparente */
        color: #1e293b !important; /* Color gris oscuro forzado para cuando editas */
        font-family: monospace !important;
        font-size: 16px !important;
        line-height: 1.8 !important;
        border: none !important;
        border-radius: 6px !important;
        outline: none !important;
        margin-bottom: 16px !important;
        box-sizing: border-box !important;
        overflow-y: auto !important;
        white-space: pre-wrap !important;
        word-wrap: break-word !important;
        font-weight: 600 !important;
    }

    /* PALETA CROMÁTICA BLINDADA CON INLINE-BLOCK (EVITA QUE SE ROMPAN LAS CLASES) */
    #ed-class-input .mcss-prefix { color: #6d28d9 !important; font-weight: 600 !important; display: inline-block !important; }    /* Púrpura */
    #ed-class-input .mcss-struct { color: #0284c7 !important; font-weight: 600 !important; display: inline-block !important; }    /* Azul */
    #ed-class-input .mcss-spacing { color: #e11d48 !important; font-weight: 600 !important; display: inline-block !important; }   /* Rojo */
    #ed-class-input .mcss-dimension { color: #b45309 !important; font-weight: 600 !important; display: inline-block !important; } /* Amarillo */
    #ed-class-input .mcss-value { color: #16a34a !important; font-weight: 600 !important; display: inline-block !important; }     /* Verde */

    #visual-editor-sidebar button {
        color: #0f172a !important; background-color: transparent !important; border: 1px solid #0f172a !important; padding: 14px !important;
        border-radius: 100px !important; font-weight: 700 !important; font-size: 14px !important; cursor: pointer !important; width: 120px !important;
        margin-top: auto !important; margin-left:auto !important; transition: all 0.15s ease !important;
    }
    #visual-editor-sidebar button:hover { background-color: #0f172a !important; color: #ffffff !important; border-color: #0f172a !important; }
    #visual-editor-sidebar .status-msg { font-size: 12px !important; text-align: center !important; margin-top: 10px !important; min-height: 15px !important; font-weight: 500 !important; }
  </style>

  <div id="visual-editor-sidebar">
      <p><span id="ed-file-info">Ninguno</span></p>
      <div id="ed-class-input" contenteditable="true" spellcheck="false"></div>
      <button id="ed-save-btn">Guardar</button>
      <p id="ed-status-msg" class="status-msg"></p>
  </div>

  <script>
    // Comprobamos si el bridge está encendido antes de cargar el editor
    fetch('http://localhost:3000', { method: 'OPTIONS' }).catch(() => {
        var sidebar = document.getElementById('visual-editor-sidebar');
        if(sidebar) sidebar.style.display = 'none';
        window.__EDITOR_DISABLED = true;
    });
  </script>
  <script src="{{ "js/editor-injector.js" | relURL }}"></script>
{{ end }}
